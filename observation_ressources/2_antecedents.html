<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 Antécédents</title>
<style>
  :root {
    --blue: #1a5fa8;
    --blue-light: #e8f0fc;
    --blue-dark: #0d3d72;
    --green: #0a7c3e;
    --orange: #e67e22;
    --gray: #6c757d;
    --border: #dee2e6;
    --bg: #ffffff;
    --section-bg: #f8faff;
    --text: #212529;
    --subtext: #495057;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(26,95,168,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #eef2f7; color: var(--text); font-size: 16px; padding-bottom: 40px; padding-top: 20px; }
  
  .floating-island {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    max-width: 95%;
    background-color: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 8px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    z-index: 1001;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .floating-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 0 5px;
  }
  .floating-island a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.85em;
      font-weight: 500;
      transition: background-color 0.2s ease-in-out;
      white-space: nowrap;
  }
  .floating-island a:not(.home-button):hover {
      background-color: rgba(255, 255, 255, 0.15);
  }
  .home-button {
      background-color: #007bff;
      font-size: 1.4em !important;
      width: 44px;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50% !important;
      padding: 0 !important;
  }
  .home-button:hover {
      background-color: #0056b3 !important;
  }
  .island-center {
    text-align: center;
    color: white;
  }
  .island-center h1 {
    font-size: 1.1em;
    font-weight: 600;
    margin: 0;
    border: 0;
    color: white;
    letter-spacing: 0.5px;
  }
  .island-center p {
    font-size: 0.8em;
    opacity: 0.8;
    margin: 0;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 14px 12px; }

  .section-card { background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid var(--border); overflow: hidden; }
  .section-header { display: flex; align-items: center; padding: 16px 18px; background: var(--section-bg); gap: 12px; }
  .section-num { background: var(--blue); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .section-title { flex: 1; font-weight: 600; font-size: 1rem; color: var(--blue-dark); }
  .section-subtitle { font-size: 0.78rem; color: var(--gray); font-weight: 400; }
  .section-body { padding: 18px; border-top: 1px solid var(--border); }

  .subsection { margin-top: 16px; padding-left: 14px; border-left: 3px solid var(--blue); }
  .subsection-title { font-size: 0.88rem; font-weight: 700; color: var(--blue); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .subsubsection { margin-top: 10px; margin-left: 10px; padding-left: 10px; border-left: 2px solid #b0c8e8; }
  .subsubsection-title { font-size: 0.82rem; font-weight: 600; color: var(--subtext); margin-bottom: 8px; }

  .field-group { margin-bottom: 14px; }
  .field-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--subtext); margin-bottom: 5px; }
  .field-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; color: var(--text); background: #fff; transition: border-color 0.2s; -webkit-appearance: none; }
  .field-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,95,168,0.12); }
  textarea.field-input { resize: vertical; min-height: 70px; font-family: inherit; }
  select.field-input { cursor: pointer; }

  .check-list { display: flex; flex-direction: column; gap: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; min-height: 44px; }
  .check-item:hover { background: var(--blue-light); }
  .check-item:active { background: #d0e3ff; }
  .check-item input[type="checkbox"] { width: 24px; height: 24px; min-width: 24px; border-radius: 5px; border: 2px solid #aaa; cursor: pointer; margin-top: 1px; accent-color: var(--blue); flex-shrink: 0; }
  .check-item span { font-size: 0.93rem; color: var(--text); line-height: 1.45; padding-top: 2px; }
  .check-item input[type="checkbox"]:checked ~ span { color: var(--green); font-weight: 500; }

  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .fields-row { grid-template-columns: 1fr; } }

  .note-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; color: var(--blue-dark); margin-bottom: 14px; }
</style>
</head>
<body>

<div class="container">
  <div class="section-card">
    <div class="section-header">
      <div class="section-num">3</div>
      <div class="section-title">Antécédents (ATCD)<div class="section-subtitle">Personnels et familiaux</div></div>
    </div>
    <div class="section-body">

      <!-- Antécédents Personnels -->
      <div class="subsection">
        <div class="subsection-title">A. Antécédents Personnels</div>

        <div class="subsubsection">
          <div class="subsubsection-title">1. Médicaux</div>
          <div class="check-list">
            <label class="check-item" style="align-items:flex-start;">
              <input type="checkbox" name="atcd_diabete" onchange="toggleAtcdDetails('diabete')" style="margin-top:4px;">
              <span>Diabète</span>
            </label>
            <div id="atcd_details_diabete" class="atcd-details" style="display:none; padding-left:36px; margin-bottom:8px;">
              <div class="field-group" style="margin-top:6px; margin-bottom:10px;">
                <label class="field-label">Type</label>
                <select name="atcd_diabete_type" class="field-input">
                  <option value="">—</option>
                  <option value="Type 1">Type 1</option>
                  <option value="Type 2">Type 2</option>
                  <option value="Gestationnel">Gestationnel</option>
                </select>
              </div>
              <div id="diabete_treatments_container">
                <div class="treatment-item" data-index="0">
                  <div style="display:flex; gap:8px; margin-bottom:8px; align-items:flex-start;">
                    <div class="field-group" style="flex:2; margin-bottom:0;">
                      <label class="field-label">Traitement</label>
                      <input type="text" name="atcd_diabete_traitement_0" class="field-input" placeholder="ADO, Metformine, Insuline…">
                    </div>
                    <div class="field-group" style="flex:2; margin-bottom:0;">
                      <label class="field-label">Posologie</label>
                      <input type="text" name="atcd_diabete_posologie_0" class="field-input" placeholder="500mg, 10UI…">
                    </div>
                    <div class="field-group" style="flex:1.5; margin-bottom:0;">
                      <label class="field-label">Prises/jour</label>
                      <input type="text" name="atcd_diabete_prises_0" class="field-input" placeholder="1cp/j, 2cp/j…">
                    </div>
                    <div class="field-group" style="flex:1.5; margin-bottom:0;">
                      <label class="field-label">Depuis</label>
                      <input type="date" name="atcd_diabete_depuis_0" class="field-input">
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" onclick="addTreatment('diabete')" style="margin-top:8px; padding:6px 12px; background:#e8f0fc; border:1px solid var(--blue); color:var(--blue); border-radius:6px; font-size:0.8rem; cursor:pointer; font-weight:600;">+ Ajouter un traitement</button>
            </div>

            <label class="check-item" style="align-items:flex-start;">
              <input type="checkbox" name="atcd_hta" onchange="toggleAtcdDetails('hta')" style="margin-top:4px;">
              <span>Hypertension Artérielle (HTA)</span>
            </label>
            <div id="atcd_details_hta" class="atcd-details" style="display:none; padding-left:36px; margin-bottom:8px;">
              <div id="hta_treatments_container">
                <div class="treatment-item" data-index="0">
                  <div style="display:flex; gap:8px; margin-bottom:8px; align-items:flex-start; margin-top:6px;">
                    <div class="field-group" style="flex:2; margin-bottom:0;">
                      <label class="field-label">Traitement</label>
                      <input type="text" name="atcd_hta_traitement_0" class="field-input" placeholder="IEC, ARA II, Amlodipine…">
                    </div>
                    <div class="field-group" style="flex:2; margin-bottom:0;">
                      <label class="field-label">Posologie</label>
                      <input type="text" name="atcd_hta_posologie_0" class="field-input" placeholder="5mg, 10mg…">
                    </div>
                    <div class="field-group" style="flex:1.5; margin-bottom:0;">
                      <label class="field-label">Prises/jour</label>
                      <input type="text" name="atcd_hta_prises_0" class="field-input" placeholder="1cp/j, 2cp/j…">
                    </div>
                    <div class="field-group" style="flex:1.5; margin-bottom:0;">
                      <label class="field-label">Depuis</label>
                      <input type="date" name="atcd_hta_depuis_0" class="field-input">
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" onclick="addTreatment('hta')" style="margin-top:8px; padding:6px 12px; background:#e8f0fc; border:1px solid var(--blue); color:var(--blue); border-radius:6px; font-size:0.8rem; cursor:pointer; font-weight:600;">+ Ajouter un traitement</button>
            </div>
          </div>

          <div class="field-group" style="margin-top:10px;">
            <label class="field-label">Précisions maladies chroniques / hospitalisations</label>
            <textarea name="atcd_medicaux_details" class="field-input" placeholder="Motif, date, durée, lieu…"></textarea>
          </div>
        </div>

        <div class="subsubsection">
          <div class="subsubsection-title">2. Chirurgicaux</div>
          <div class="fields-row">
            <div class="field-group">
              <label class="field-label">Type d'intervention</label>
              <input type="text" name="atcd_chir_type" class="field-input" placeholder="Ex: appendicectomie">
            </div>
            <div class="field-group">
              <label class="field-label">Date</label>
              <input type="date" name="atcd_chir_date" class="field-input">
            </div>
          </div>
        </div>

        <div class="subsubsection">
          <div class="subsubsection-title">3. Toxico-Allergiques</div>
          <div class="fields-row">
            <div class="field-group">
              <label class="field-label">Tabagisme</label>
              <select name="atcd_tabagisme_statut" class="field-input">
                <option value="">—</option>
                <option value="Non fumeur">Non fumeur</option>
                <option value="Fumeur actif">Fumeur actif</option>
                <option value="Tabagisme passif">Tabagisme passif</option>
                <option value="Sevré >3 ans">Sevré > 3 ans</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Paquets-années (PA)</label>
              <input type="text" name="atcd_tabagisme_pa" class="field-input" placeholder="Ex: 20 PA">
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Allergies</label>
            <textarea name="atcd_allergies" class="field-input" placeholder="Médicamenteuses, alimentaires, environnementales – réaction décrite"></textarea>
          </div>
        </div>
      </div>

      <!-- Antécédents Familiaux -->
      <div class="subsection" style="margin-top:16px;">
        <div class="subsection-title">B. Antécédents Familiaux (premier degré)</div>
        <div class="note-box" style="margin-bottom:10px;">💡 Pour chaque pathologie cochée, précisez : <strong>chez qui</strong> (père, mère, frère…) et les informations cliniques associées.</div>
        <div class="check-list">
          <label class="check-item" style="align-items:flex-start;">
            <input type="checkbox" name="atcd_fam_diabete" onchange="toggleFamDetail('fam_diabete')" style="margin-top:4px;">
            <span>Diabète familial</span>
          </label>
          <div id="detail_fam_diabete" style="display:none; padding-left:36px; margin-bottom:8px;">
            <label class="field-label">Chez qui & informations associées</label>
            <textarea name="atcd_fam_diabete_info" class="field-input" placeholder="Ex : père — DT2 depuis 20 ans sous metformine…" rows="2"></textarea>
          </div>

          <label class="check-item" style="align-items:flex-start;">
            <input type="checkbox" name="atcd_fam_hta" onchange="toggleFamDetail('fam_hta')" style="margin-top:4px;">
            <span>HTA familiale</span>
          </label>
          <div id="detail_fam_hta" style="display:none; padding-left:36px; margin-bottom:8px;">
            <label class="field-label">Chez qui & informations associées</label>
            <textarea name="atcd_fam_hta_info" class="field-input" placeholder="Ex : mère — HTA traitée, AVC à 60 ans…" rows="2"></textarea>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// Toggle ATCD details
function toggleAtcdDetails(key) {
  const cb = document.querySelector(`[name="atcd_${key}"]`);
  const details = document.getElementById(`atcd_details_${key}`);
  if (details) details.style.display = cb.checked ? 'block' : 'none';
}

// Add Treatment
const treatmentCounters = {};
function addTreatment(pathology) {
  if (!treatmentCounters[pathology]) treatmentCounters[pathology] = 1;
  const container = document.getElementById(`${pathology}_treatments_container`);
  const newIndex = treatmentCounters[pathology]++;
  const div = document.createElement('div');
  div.className = 'treatment-item';
  div.setAttribute('data-index', newIndex);
  
  div.innerHTML = `
    <div style="display:flex; gap:8px; margin-bottom:8px; align-items:flex-start; margin-top:8px; padding-top:8px; border-top:1px solid #e0e0e0;">
      <div class="field-group" style="flex:2; margin-bottom:0;">
        <label class="field-label">Traitement</label>
        <input type="text" name="atcd_${pathology}_traitement_${newIndex}" class="field-input" placeholder="Nom du médicament…">
      </div>
      <div class="field-group" style="flex:2; margin-bottom:0;">
        <label class="field-label">Posologie</label>
        <input type="text" name="atcd_${pathology}_posologie_${newIndex}" class="field-input" placeholder="Dosage…">
      </div>
      <div class="field-group" style="flex:1.5; margin-bottom:0;">
        <label class="field-label">Prises/jour</label>
        <input type="text" name="atcd_${pathology}_prises_${newIndex}" class="field-input" placeholder="1cp/j…">
      </div>
      <div class="field-group" style="flex:1.5; margin-bottom:0;">
        <label class="field-label">Depuis</label>
        <input type="date" name="atcd_${pathology}_depuis_${newIndex}" class="field-input">
      </div>
      <button type="button" onclick="this.parentElement.parentElement.remove();" style="margin-top:26px; padding:4px 8px; background:#ffe6e6; border:1px solid #c0392b; color:#c0392b; border-radius:6px; font-size:0.75rem; cursor:pointer; height:38px;">✕</button>
    </div>`;
  container.appendChild(div);
}

// Toggle familiaux details
function toggleFamDetail(key) {
  const panel = document.getElementById(`detail_${key}`);
  if (!panel) return;
  const trigger = document.querySelector(`[name="atcd_${key}"]`);
  if (trigger) panel.style.display = trigger.checked ? 'block' : 'none';
}
</script>

</body>
</html>
