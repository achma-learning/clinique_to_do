<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 Motif de Consultation</title>
<style>
  :root {
    --blue: #1a5fa8;
    --blue-light: #e8f0fc;
    --blue-dark: #0d3d72;
    --border: #dee2e6;
    --bg: #ffffff;
    --section-bg: #f8faff;
    --text: #212529;
    --subtext: #495057;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(26,95,168,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #eef2f7; color: var(--text); font-size: 16px; padding-bottom: 40px; padding-top: 20px; }
  
  .floating-island {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    max-width: 95%;
    background-color: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 8px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    z-index: 1001;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .floating-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 0 5px;
  }
  .floating-island a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.85em;
      font-weight: 500;
      transition: background-color 0.2s ease-in-out;
      white-space: nowrap;
  }
  .floating-island a:not(.home-button):hover {
      background-color: rgba(255, 255, 255, 0.15);
  }
  .home-button {
      background-color: #007bff;
      font-size: 1.4em !important;
      width: 44px;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50% !important;
      padding: 0 !important;
  }
  .home-button:hover {
      background-color: #0056b3 !important;
  }
  .island-center {
    text-align: center;
    color: white;
  }
  .island-center h1 {
    font-size: 1.1em;
    font-weight: 600;
    margin: 0;
    border: 0;
    color: white;
    letter-spacing: 0.5px;
  }
  .island-center p {
    font-size: 0.8em;
    opacity: 0.8;
    margin: 0;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 14px 12px; }

  .section-card { background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid var(--border); overflow: hidden; }
  .section-header { display: flex; align-items: center; padding: 16px 18px; background: var(--section-bg); gap: 12px; }
  .section-num { background: var(--blue); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .section-title { flex: 1; font-weight: 600; font-size: 1rem; color: var(--blue-dark); }
  .section-subtitle { font-size: 0.78rem; color: var(--gray); font-weight: 400; }
  .section-body { padding: 18px; border-top: 1px solid var(--border); }

  .field-group { margin-bottom: 14px; }
  .field-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--subtext); margin-bottom: 5px; }
  .field-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; color: var(--text); background: #fff; transition: border-color 0.2s; -webkit-appearance: none; }
  .field-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,95,168,0.12); }
  textarea.field-input { resize: vertical; min-height: 70px; font-family: inherit; }

  .note-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; color: var(--blue-dark); margin-bottom: 14px; }
</style>
</head>
<body>

<div class="container">
  <div class="section-card">
    <div class="section-header">
      <div class="section-num">2</div>
      <div class="section-title">Motif de Consultation<div class="section-subtitle">MDC — en mots propres du patient</div></div>
    </div>
    <div class="section-body">
      <div class="note-box">💡 C'est un signe fonctionnel, jamais un diagnostic à ce stade.</div>
      <div class="field-group">
        <label class="field-label">Plainte principale (mots du patient)</label>
        <textarea name="plainte_principale" class="field-input" placeholder="Ex : « J'ai mal au ventre depuis 3 jours... »"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Date de début des symptômes</label>
        <input type="date" name="date_debut_symptomes" class="field-input">
      </div>
    </div>
  </div>
</div>

</body>
</html>
