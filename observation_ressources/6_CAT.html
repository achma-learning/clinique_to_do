<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 CAT — Conduite À Tenir</title>
<style>
  :root {
    --blue: #1a5fa8;
    --blue-light: #e8f0fc;
    --blue-dark: #0d3d72;
    --border: #dee2e6;
    --bg: #ffffff;
    --section-bg: #f8faff;
    --text: #212529;
    --subtext: #495057;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(26,95,168,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #eef2f7; color: var(--text); font-size: 16px; padding-bottom: 40px; padding-top: 20px; }
  
  .floating-island {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    max-width: 95%;
    background-color: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 8px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    z-index: 1001;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .floating-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 0 5px;
  }
  .floating-island a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.85em;
      font-weight: 500;
      transition: background-color 0.2s ease-in-out;
      white-space: nowrap;
  }
  .floating-island a:not(.home-button):hover {
      background-color: rgba(255, 255, 255, 0.15);
  }
  .home-button {
      background-color: #007bff;
      font-size: 1.4em !important;
      width: 44px;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50% !important;
      padding: 0 !important;
  }
  .home-button:hover {
      background-color: #0056b3 !important;
  }
  .island-center {
    text-align: center;
    color: white;
  }
  .island-center h1 {
    font-size: 1.1em;
    font-weight: 600;
    margin: 0;
    border: 0;
    color: white;
    letter-spacing: 0.5px;
  }
  .island-center p {
    font-size: 0.8em;
    opacity: 0.8;
    margin: 0;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 14px 12px; }

  .section-card { background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid var(--border); overflow: hidden; }
  .section-header { display: flex; align-items: center; padding: 16px 18px; background: var(--section-bg); gap: 12px; }
  .section-num { background: var(--blue); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .section-title { flex: 1; font-weight: 600; font-size: 1rem; color: var(--blue-dark); }
  .section-subtitle { font-size: 0.78rem; color: var(--gray); font-weight: 400; }
  .section-body { padding: 18px; border-top: 1px solid var(--border); }

  .subsection { margin-top: 16px; padding-left: 14px; border-left: 3px solid var(--blue); }
  .subsection-title { font-size: 0.88rem; font-weight: 700; color: var(--blue); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.3px; }

  .field-group { margin-bottom: 14px; }
  .field-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--subtext); margin-bottom: 5px; }
  .field-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; color: var(--text); background: #fff; transition: border-color 0.2s; -webkit-appearance: none; }
  .field-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,95,168,0.12); }
  textarea.field-input { resize: vertical; min-height: 70px; font-family: inherit; }

  .check-list { display: flex; flex-direction: column; gap: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; min-height: 44px; }
  .check-item:hover { background: var(--blue-light); }
  .check-item input[type="checkbox"] { width: 24px; height: 24px; min-width: 24px; border-radius: 5px; border: 2px solid #aaa; cursor: pointer; margin-top: 1px; accent-color: var(--blue); flex-shrink: 0; }
  .check-item span { font-size: 0.93rem; color: var(--text); line-height: 1.45; padding-top: 2px; }

  .note-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; color: var(--blue-dark); margin-bottom: 14px; }
</style>
</head>
<body>

<div class="container">
  <div class="section-card">
    <div class="section-header">
      <div class="section-num">7</div>
      <div class="section-title">CAT — Conduite À Tenir<div class="section-subtitle">Diagnostique et thérapeutique</div></div>
    </div>
    <div class="section-body">
      
      <div class="subsection">
        <div class="subsection-title">7.1 — Diagnostique</div>
        
        <!-- Bilan Biologique -->
        <div class="subsection">
          <div class="subsection-title" style="display:flex; justify-content:space-between; align-items:center;">
            <label class="check-item" style="padding:0; margin:0; background:none; min-height:auto;">
              <input type="checkbox" name="cat_biologie"> 
              <span style="font-size:0.88rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.3px;">Bilan biologique</span>
            </label>
          </div>
          <div class="note-box">💡 Cochez les examens réalisés. Exemples : NFS, bilan hépatique, rénal, ionogramme, CRP, etc.</div>
          <div class="field-group">
            <label class="field-label">Détails des bilans biologiques</label>
            <textarea name="cat_biologie_details" class="field-input" placeholder="Ex : NFS, bilan hépatique (ALAT, ASAT), fonction rénale (urée, créatinine), ionogramme, CRP…"></textarea>
          </div>
        </div>
        
        <!-- Imagerie -->
        <div class="subsection">
          <div class="subsection-title">
            <label class="check-item" style="padding:0; margin:0; background:none; min-height:auto;">
              <input type="checkbox" name="cat_imagerie"> 
              <span style="font-size:0.88rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.3px;">Imagerie (RX, Echo, TDM, IRM…)</span>
            </label>
          </div>
          <div class="field-group" style="margin-top:10px;">
            <textarea name="cat_imagerie_details" class="field-input" placeholder="Ex: Échographie abdominale, RX Thorax F+P, TDM cérébrale..."></textarea>
          </div>
        </div>

        <!-- Autres examens -->
        <div class="subsection">
          <div class="subsection-title">
            <label class="check-item" style="padding:0; margin:0; background:none; min-height:auto;">
              <input type="checkbox" name="cat_autres_examens"> 
              <span style="font-size:0.88rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.3px;">Autres examens (ECG, endoscopie, biopsie…)</span>
            </label>
          </div>
          <div class="field-group" style="margin-top:10px;">
            <textarea name="cat_autres_examens_details" class="field-input" placeholder="Ex: ECG, endoscopie digestive, biopsie rénale, EMG..."></textarea>
          </div>
        </div>

        <div class="field-group" style="margin-top:10px;">
          <label class="field-label">Plan d'examens complémentaires hiérarchisés</label>
          <textarea name="cat_examens_details" class="field-input" placeholder="En urgence: 1.&#10;En différé: 2."></textarea>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-title">7.2 — Thérapeutique</div>
        <div class="check-list">
          <label class="check-item"><input type="checkbox" name="cat_ther_etiologique"><span>Traitement étiologique (traiter la cause)</span></label>
          <label class="check-item"><input type="checkbox" name="cat_ther_symptomatique"><span>Traitement symptomatique (soulager les symptômes)</span></label>
          <label class="check-item"><input type="checkbox" name="cat_ther_mesures_hygiene"><span>Mesures hygiéno-diététiques</span></label>
          <label class="check-item"><input type="checkbox" name="cat_ther_surveillance"><span>Plan de surveillance et de suivi défini</span></label>
          <label class="check-item"><input type="checkbox" name="cat_ther_education"><span>Éducation thérapeutique du patient planifiée</span></label>
        </div>
        <div class="field-group" style="margin-top:10px;">
          <label class="field-label">Détails du traitement</label>
          <textarea name="cat_traitement_details" class="field-input" placeholder="Médicaments, doses, durée, ordonnance…"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
